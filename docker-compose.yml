networks:
  wine-net:
    driver: bridge

services:
  webapp:
    build: .
    env_file: ".env"
    environment:
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - PORT=3000
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
    ports:
      - "3000:3000"
    volumes:
      - /tmp/wine-pairing-suggestions/bin:/tmp/wine-pairing-suggestions/bin
      - .:/usr/src/app:cached
    networks:
      - wine-net
    depends_on:
      - cache
      - dynamodb-local
      - dynamodb-setup

  cache:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - wine-net

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    networks:
      - wine-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Setup DynamoDB tables after DynamoDB is ready
  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: dynamodb-setup
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_DEFAULT_REGION=us-west-2
    volumes:
      - ./:/workspace
    working_dir: /workspace
    networks:
      - wine-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "🗄️  Setting up local DynamoDB tables..."
        ENDPOINT="http://dynamodb-local:8000"
        REGION="us-west-2"

        echo "   Creating Accounts table..."
        aws dynamodb describe-table --table-name Accounts --endpoint-url $$ENDPOINT --region $$REGION >/dev/null 2>&1 || \
        aws dynamodb create-table \
          --table-name Accounts \
          --billing-mode PAY_PER_REQUEST \
          --attribute-definitions AttributeName=ID,AttributeType=S \
          --key-schema AttributeName=ID,KeyType=HASH \
          --endpoint-url $$ENDPOINT --region $$REGION >/dev/null
        echo "   ✅ Accounts table ready"

        echo "   Creating RecipePairings table..."
        aws dynamodb describe-table --table-name RecipePairings --endpoint-url $$ENDPOINT --region $$REGION >/dev/null 2>&1 || \
        aws dynamodb create-table \
          --table-name RecipePairings \
          --billing-mode PAY_PER_REQUEST \
          --attribute-definitions \
            AttributeName=ID,AttributeType=S \
            AttributeName=Type,AttributeType=S \
            AttributeName=DateCreated,AttributeType=S \
          --key-schema AttributeName=ID,KeyType=HASH \
          --global-secondary-indexes \
            'IndexName=Type-DateCreated-index,KeySchema=[{AttributeName=Type,KeyType=HASH},{AttributeName=DateCreated,KeyType=RANGE}],Projection={ProjectionType=KEYS_ONLY}' \
          --endpoint-url $$ENDPOINT --region $$REGION >/dev/null
        echo "   ✅ RecipePairings table ready"

        echo "🎉 Local DynamoDB setup complete!"
        aws dynamodb list-tables --endpoint-url $$ENDPOINT --region $$REGION --output table
    restart: "no"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: dynamodb-admin
    depends_on:
      - dynamodb-local
      - dynamodb-setup
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-west-2
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
    ports:
      - "8001:8001"
    networks:
      - wine-net

volumes:
  redis-data:
  dynamodb-data:
